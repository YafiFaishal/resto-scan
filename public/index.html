<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestoScan — Pesan Makanan</title>
    <meta name="description" content="Pesan makanan dengan mudah melalui QR code. Scan, pilih, dan nikmati!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Cafe Background (blurred) -->
    <div class="bg-overlay" style="background-image: url('/images/cafe-bg.png');"></div>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="card">
            <img src="/images/logo.svg" alt="RestoScan Logo" class="brand-logo" style="margin: 0 auto 16px auto; display: block;">
            <h1>Pesan Makanan</h1>
            <p class="subtitle">Scan QR atau masukkan nomor meja</p>

            <form id="entryForm">
                <div class="form-group">
                    <label for="tableName">Nama Anda</label>
                    <input type="text" id="tableName" placeholder="Masukkan nama..." required>
                </div>

                <div class="form-group">
                    <label for="tableNumber">Nomor Meja</label>
                    <input type="number" id="tableNumber" placeholder="Misal: 5" required min="1">
                </div>

                <button type="submit" class="btn btn-primary">Lanjut ke Menu</button>
            </form>

            <p class="footer-text">atau buka link dengan parameter: <code>?table=5</code></p>
        </div>
    </div>

    <script>
        // Jika URL punya parameter ?table=5, isi otomatis nomor meja
        const params = new URLSearchParams(window.location.search);
        if (params.has('table')) {
            document.getElementById('tableNumber').value = params.get('table');
        }

        // Handle form submit
        document.getElementById('entryForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('tableName').value;
            const table = document.getElementById('tableNumber').value;

            // Simpan ke sessionStorage
            sessionStorage.setItem('customerName', name);
            sessionStorage.setItem('tableNumber', table);

            // Redirect ke halaman menu
            window.location.href = 'menu.html';
        });
    </script>
</body>

</html>
