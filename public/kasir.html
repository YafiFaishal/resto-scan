<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestoScan — Dashboard Kasir</title>
    <meta name="description" content="Dashboard kasir untuk mengelola pesanan restoran secara real-time.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Cafe Background (blurred) -->
    <div class="bg-overlay" style="background-image: url('/images/cafe-bg.png');"></div>
    <div class="bg-gradient"></div>

    <!-- LOGIN PAGE -->
    <div id="loginPage">
        <div class="login-container">
            <img src="/images/logo-kasir.svg" alt="RestoScan Kasir" class="brand-logo" style="margin: 0 auto 16px auto; display: block;">
            <h1>Kasir Login</h1>
            <p>Masukkan password untuk akses dashboard</p>

            <form class="login-form" onsubmit="handleLogin(event)">
                <input type="password" id="passwordInput" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <div class="error-message" id="errorMsg">Password salah!</div>
        </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div id="dashboardPage" class="container">
        <!-- Hero Banner (same style as menu) -->
        <div class="hero-banner kasir-hero">
            <img src="/images/kasir-banner.png" alt="Dashboard Kasir" class="hero-img">
            <div class="hero-overlay hero-overlay-center">
                <div class="hero-top">
                    <img src="/images/logo-kasir-white.svg" alt="RestoScan Kasir" class="hero-logo">
                    <button class="btn-back logout-hero" onclick="logout()">🚪 Logout</button>
                </div>
                <h1 class="hero-title" style="text-align:center;">Dashboard Kasir</h1>
                <p class="hero-subtitle" id="lastUpdate" style="text-align:center;">Auto-refresh setiap 15 detik</p>
                <div class="kasir-stats">
                    <div class="kasir-stat-card">
                        <span class="kasir-stat-num" id="statPending">0</span>
                        <span class="kasir-stat-label">⏳ Menunggu</span>
                    </div>
                    <div class="kasir-stat-card">
                        <span class="kasir-stat-num" id="statProses">0</span>
                        <span class="kasir-stat-label">👨‍🍳 Diproses</span>
                    </div>
                    <div class="kasir-stat-card">
                        <span class="kasir-stat-num" id="statSiap">0</span>
                        <span class="kasir-stat-label">✅ Siap</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Daftar Pesanan -->
        <div id="ordersList" class="kasir-container">
            <p>Loading pesanan...</p>
        </div>
    </div>

    <script>
        // Ganti password di bawah ini
        const KASIR_PASSWORD = 'resto123';
        const API_BASE_URL = 'https://resto-scan-production.up.railway.app'; // Ganti dengan URL Railway kamu

        // Check apakah sudah login
        window.addEventListener('load', () => {
            const isLoggedIn = sessionStorage.getItem('kasirLoggedIn');
            if (isLoggedIn === 'true') {
                showDashboard();
                loadOrders();
                setInterval(loadOrders, 15000);
            } else {
                showLogin();
            }
        });

        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('passwordInput').value;

            if (password === KASIR_PASSWORD) {
                sessionStorage.setItem('kasirLoggedIn', 'true');
                showDashboard();
                loadOrders();
                setInterval(loadOrders, 15000);
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('passwordInput').value = '';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
            }
        }

        function showLogin() {
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('dashboardPage').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'block';
        }

        function logout() {
            sessionStorage.removeItem('kasirLoggedIn');
            showLogin();
            document.getElementById('passwordInput').value = '';
        }

        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/orders`);
                const data = await response.json();

                if (data.success) {
                    renderOrders(data.orders);
                    updateStats(data.orders);
                    updateLastRefresh();
                }
            } catch (err) {
                console.error('Error loading orders:', err);
            }
        }

        function renderOrders(orders) {
            const ordersList = document.getElementById('ordersList');

            if (orders.length === 0) {
                ordersList.innerHTML = '<p style="grid-column: 1/-1;">Tidak ada pesanan</p>';
                return;
            }

            // Sort: active orders first (pending > diproses > siap), then selesai
            const statusPriority = { 'pending': 0, 'diproses': 1, 'siap': 2, 'selesai': 3 };
            const sorted = [...orders].sort((a, b) => {
                const pa = statusPriority[a.status] ?? 99;
                const pb = statusPriority[b.status] ?? 99;
                if (pa !== pb) return pa - pb;
                return new Date(b.created_at) - new Date(a.created_at);
            });

            const activeOrders = sorted.filter(o => o.status !== 'selesai');
            const completedOrders = sorted.filter(o => o.status === 'selesai');

            function renderCard(order) {
                const isDone = order.status === 'selesai';
                return `
                <div class="order-card ${order.status} ${isDone ? 'order-done' : ''}">
                    <h3>Meja ${order.table_number}</h3>
                    <div class="order-info">
                        <strong>${order.customer_name}</strong><br>
                        ID: #${order.id.slice(0, 8).toUpperCase()}<br>
                        ${new Date(order.created_at).toLocaleString('id-ID')}
                    </div>
                    <div class="status-current ${order.status}">
                        ${getStatusLabel(order.status)}
                    </div>
                    <div class="action-buttons">
                        <button class="btn-status ${order.status === 'pending' ? 'active' : ''}" 
                            onclick="updateStatus('${order.id}', 'pending')">Pending</button>
                        <button class="btn-status ${order.status === 'diproses' ? 'active' : ''}" 
                            onclick="updateStatus('${order.id}', 'diproses')">Masak</button>
                        <button class="btn-status ${order.status === 'siap' ? 'active' : ''}" 
                            onclick="updateStatus('${order.id}', 'siap')">Siap</button>
                        <button class="btn-status ${order.status === 'selesai' ? 'active' : ''}" 
                            onclick="updateStatus('${order.id}', 'selesai')">Selesai</button>
                    </div>
                </div>`;
            }

            let html = '';

            // Active orders
            if (activeOrders.length > 0) {
                html += activeOrders.map(renderCard).join('');
            }

            // Separator + completed orders
            if (completedOrders.length > 0) {
                html += `<div class="orders-separator"><span>✅ Pesanan Selesai (${completedOrders.length})</span></div>`;
                html += completedOrders.map(renderCard).join('');
            }

            ordersList.innerHTML = html;
        }

        function getStatusLabel(status) {
            const labels = {
                'pending': '⏳ Menunggu',
                'diproses': '👨‍🍳 Diproses',
                'siap': '✅ Siap',
                'selesai': '🎉 Selesai'
            };
            return labels[status] || status;
        }

        async function updateStatus(orderId, newStatus) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/orders/${orderId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                const data = await response.json();
                if (data.success) {
                    loadOrders(); // Refresh daftar
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                console.error('Error updating status:', err);
                alert('Gagal update status');
            }
        }

        function updateStats(orders) {
            const statPending = orders.filter(o => o.status === 'pending').length;
            const statProses = orders.filter(o => o.status === 'diproses').length;
            const statSiap = orders.filter(o => o.status === 'siap').length;

            document.getElementById('statPending').textContent = statPending;
            document.getElementById('statProses').textContent = statProses;
            document.getElementById('statSiap').textContent = statSiap;
        }

        function updateLastRefresh() {
            const now = new Date().toLocaleTimeString('id-ID');
            document.getElementById('lastUpdate').textContent = `Update terakhir: ${now}`;
        }
    </script>
</body>

</html>
