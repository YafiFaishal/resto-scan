<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestoScan — Menu</title>
    <meta name="description" content="Lihat menu restoran dan pesan langsung dari meja Anda.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📋 Menu Kami</h1>
            <p>Meja <span id="displayTable"></span> — <span id="displayName"></span></p>
            <button class="btn btn-secondary" onclick="goBack()">← Kembali</button>
        </div>

        <!-- Daftar Menu -->
        <div id="menuList" class="menu-grid">
            <p>Loading menu...</p>
        </div>

        <!-- Keranjang (Fixed di bawah) -->
        <div class="cart-container">
            <h3>🛒 Keranjang Saya</h3>
            <div id="cartItems" class="cart-items">
                <p class="empty-cart">Belum ada item</p>
            </div>
            <button class="btn btn-primary" onclick="checkout()">Pesan Sekarang</button>
        </div>
    </div>

    <script>
        // Ambil data pelanggan dari sessionStorage
        const customerName = sessionStorage.getItem('customerName');
        const tableNumber = sessionStorage.getItem('tableNumber');
        const API_BASE_URL = 'https://resto-scan-production.up.railway.app';

        if (!customerName || !tableNumber) {
            window.location.href = 'index.html';
        }

        document.getElementById('displayName').textContent = customerName;
        document.getElementById('displayTable').textContent = tableNumber;

        // Ambil menu dari API
        async function loadMenus() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/menus`);
                const data = await response.json();

                if (data.success) {
                    renderMenus(data.data);
                }
            } catch (err) {
                console.error('Error loading menus:', err);
                document.getElementById('menuList').innerHTML = '<p>Gagal memuat menu</p>';
            }
        }

        // Fallback image map — digunakan jika image_url di database masih placeholder
        const MENU_IMAGE_FALLBACK = {
            'nasi goreng': 'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=600&h=450&fit=crop&q=80',
            'mie ayam': 'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=600&h=450&fit=crop&q=80',
            'lumpia goreng': 'https://images.unsplash.com/photo-1548507200-84bcab4753e6?w=600&h=450&fit=crop&q=80',
            'es cendol': 'https://images.unsplash.com/photo-1615478503562-ec2d8aa0a7e6?w=600&h=450&fit=crop&q=80',
            'soto ayam': 'https://images.unsplash.com/photo-1547592180-85f173990554?w=600&h=450&fit=crop&q=80',
        };

        function getMenuImage(menu) {
            // Jika image_url valid (bukan placeholder), gunakan dari database
            if (menu.image_url && !menu.image_url.includes('placeholder')) {
                return menu.image_url;
            }
            // Cari fallback berdasarkan nama menu (case-insensitive)
            const key = menu.name.toLowerCase();
            return MENU_IMAGE_FALLBACK[key] || `https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&h=450&fit=crop&q=80`;
        }

        // Render daftar menu
        function renderMenus(menus) {
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = '';

            menus.forEach(menu => {
                const imgUrl = getMenuImage(menu);
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `
          <img src="${imgUrl}" alt="${menu.name}" loading="lazy">
          <h3>${menu.name}</h3>
          <p class="category">${menu.category}</p>
          <p class="description">${menu.description}</p>
          <p class="price">Rp ${menu.price.toLocaleString('id-ID')}</p>
          <button class="btn btn-add" onclick="addToCart('${menu.id}', '${menu.name}', ${menu.price})">
            + Tambah
          </button>
        `;
                menuList.appendChild(card);
            });
        }

        // Tambah item ke keranjang
        function addToCart(menuId, menuName, price) {
            let cart = JSON.parse(sessionStorage.getItem('cart') || '[]');

            // Cek apakah item sudah ada di keranjang
            const existingItem = cart.find(item => item.id === menuId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id: menuId, name: menuName, price, quantity: 1 });
            }

            sessionStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Render keranjang
        function renderCart() {
            const cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            const cartItems = document.getElementById('cartItems');

            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="empty-cart">Belum ada item</p>';
                return;
            }

            cartItems.innerHTML = cart.map((item, index) => `
        <div class="cart-item">
          <span>${item.name}</span>
          <span class="qty">
            <button onclick="decreaseQty(${index})">-</button>
            ${item.quantity}
            <button onclick="increaseQty(${index})">+</button>
          </span>
          <span>Rp ${(item.price * item.quantity).toLocaleString('id-ID')}</span>
          <button class="btn-remove" onclick="removeFromCart(${index})">❌</button>
        </div>
      `).join('');
        }

        // Hapus dari keranjang
        function removeFromCart(index) {
            let cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            sessionStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Tambah qty
        function increaseQty(index) {
            let cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            cart[index].quantity += 1;
            sessionStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Kurangi qty
        function decreaseQty(index) {
            let cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1;
            } else {
                cart.splice(index, 1);
            }
            sessionStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Checkout
        async function checkout() {
            const cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            if (cart.length === 0) {
                alert('Keranjang masih kosong!');
                return;
            }

            const customerName = sessionStorage.getItem('customerName');
            const tableNumber = sessionStorage.getItem('tableNumber');

            // Siapkan data untuk dikirim ke backend
            const orderData = {
                table_number: parseInt(tableNumber),
                customer_name: customerName,
                items: cart.map(item => ({
                    id: item.id,
                    quantity: item.quantity,
                    notes: '' // Nanti bisa tambah notes
                }))
            };

            try {
                // POST ke backend
                const response = await fetch(`${API_BASE_URL}/api/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                if (data.success) {
                    // Simpan order_id ke sessionStorage
                    sessionStorage.setItem('orderId', data.order_id);

                    // Clear keranjang
                    sessionStorage.removeItem('cart');

                    // Redirect ke halaman status
                    window.location.href = `status.html?order_id=${data.order_id}`;
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                console.error('Error checkout:', err);
                alert('Gagal membuat pesanan');
            }
        }

        // Kembali
        function goBack() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // Load menu saat halaman terbuka
        loadMenus();
        renderCart();
    </script>
</body>

</html>
