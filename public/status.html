<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestoScan — Status Pesanan</title>
    <meta name="description" content="Pantau status pesanan Anda secara real-time.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📊 Status Pesanan</h1>
            <button class="btn btn-secondary" onclick="goHome()">← Kembali ke Menu</button>
        </div>

        <div id="orderStatus" class="loading">
            <p>Mengambil data pesanan...</p>
        </div>
    </div>

    <script>
        // Ambil order_id dari URL parameter
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id');
        const API_BASE_URL = 'https://resto-scan-production.up.railway.app';

        if (!orderId) {
            document.getElementById('orderStatus').innerHTML = '<p>Order ID tidak ditemukan</p>';
        } else {
            // Polling setiap 5 detik untuk update status
            loadOrderStatus();
            setInterval(loadOrderStatus, 5000);
        }

        async function loadOrderStatus() {
            try {
                // Ambil data order
                const response = await fetch(`${API_BASE_URL}/api/orders/${orderId}`);
                const data = await response.json();

                if (data.success) {
                    renderOrderStatus(data.order);
                } else {
                    document.getElementById('orderStatus').innerHTML = `<p>${data.message}</p>`;
                }
            } catch (err) {
                console.error('Error loading order:', err);
            }
        }

        function renderOrderStatus(order) {
            const statusClass = `status-${order.status}`;
            const statusLabel = {
                'pending': '⏳ Menunggu Dikonfirmasi',
                'diproses': '👨‍🍳 Sedang Dimasak',
                'siap': '✅ Siap Dihidangkan',
                'selesai': '🎉 Selesai'
            };

            const html = `
        <div class="order-detail">
          <h2>Pesanan #${order.id.slice(0, 8).toUpperCase()}</h2>
          <p><strong>Nama:</strong> ${order.customer_name}</p>
          <p><strong>Meja:</strong> ${order.table_number}</p>
          <p><strong>Status:</strong> <span class="status-badge ${statusClass}">${statusLabel[order.status] || order.status}</span></p>
          <p><strong>Waktu:</strong> ${new Date(order.created_at).toLocaleString('id-ID')}</p>

          <div class="order-items">
            <h3>Item Pesanan:</h3>
            <div id="itemsList"></div>
          </div>
        </div>
      `;

            document.getElementById('orderStatus').innerHTML = html;

            // Load order items
            loadOrderItems(order.id);
        }

        async function loadOrderItems(orderId) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/orders/${orderId}/items`);
                const data = await response.json();

                if (data.success) {
                    const itemsHtml = data.items.map(item => `
            <div class="order-item">
              <span>${item.menu_name}</span>
              <span>${item.quantity}x</span>
              <span>Rp ${(item.price * item.quantity).toLocaleString('id-ID')}</span>
            </div>
          `).join('');

                    document.getElementById('itemsList').innerHTML = itemsHtml;
                }
            } catch (err) {
                console.error('Error loading items:', err);
            }
        }

        function goHome() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
