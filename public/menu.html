<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestoScan — Menu</title>
    <meta name="description" content="Lihat menu restoran dan pesan langsung dari meja Anda.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Cafe Background (blurred) -->
    <div class="bg-overlay" style="background-image: url('/images/cafe-bg.png');"></div>
    <div class="bg-gradient"></div>

    <div class="container">
        <!-- Hero Section (merged with header) -->
        <div class="hero-banner">
            <img src="/images/hero-banner.png" alt="RestoScan Banner" class="hero-img">
            <div class="hero-overlay">
                <div class="hero-top">
                    <img src="/images/logo.svg" alt="RestoScan Logo" class="hero-logo">
                    <button class="btn-back" onclick="goBack()">← Kembali</button>
                </div>
                <h1 class="hero-title">Menu Kami</h1>
                <p class="hero-subtitle">Meja <span id="displayTable"></span> — <span id="displayName"></span></p>
                <div class="hero-badges">
                    <span class="hero-badge">🍜 30+ Menu</span>
                    <span class="hero-badge">⚡ Pesan Cepat</span>
                    <span class="hero-badge">🔥 Fresh & Halal</span>
                </div>
            </div>
        </div>

        <!-- Category Filter Tabs -->
        <div class="category-tabs-wrapper">
            <div class="category-tabs" id="categoryTabs">
                <button class="cat-tab active" data-cat="all" onclick="filterCategory('all', this)">🍽️ Semua</button>
                <button class="cat-tab" data-cat="favorites" onclick="filterCategory('favorites', this)">🔥 Paling
                    Favorit</button>
            </div>
        </div>

        <!-- Daftar Menu -->
        <div id="menuList" class="menu-container">
            <p>Loading menu...</p>
        </div>

        <!-- Keranjang (Fixed di bawah, collapsible) -->
        <div class="cart-container" id="cartContainer">
            <!-- Collapsed Bar (tap to expand) -->
            <div class="cart-collapsed" id="cartCollapsed" onclick="expandCart()">
                <div class="cart-handle"></div>
                <div class="cart-collapsed-content">
                    <div class="cart-collapsed-left">
                        <span class="cart-icon">🛒</span>
                        <span class="cart-count" id="cartCount">0 item</span>
                        <span class="cart-total" id="cartTotalCollapsed">· Rp 0</span>
                    </div>
                    <button class="btn-cart-checkout" onclick="event.stopPropagation(); checkout()">
                        Pesan <span id="cartTotalBtnCollapsed">Rp 0</span>
                    </button>
                </div>
            </div>

            <!-- Expanded Content -->
            <div class="cart-expanded" id="cartExpanded">
                <div class="cart-header">
                    <h3>Keranjang Saya</h3>
                    <button class="btn-collapse" onclick="collapseCart()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="18 15 12 9 6 15"></polyline>
                        </svg>
                    </button>
                </div>
                <div id="cartItems" class="cart-items">
                    <p class="empty-cart">Belum ada item</p>
                </div>
                <div class="cart-footer">
                    <div class="cart-summary">
                        <span class="summary-label">Total</span>
                        <span class="summary-value" id="cartTotalExpanded">Rp 0</span>
                    </div>
                    <button class="btn btn-primary" onclick="checkout()">Pesan Sekarang</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ambil data pelanggan dari sessionStorage
        const customerName = sessionStorage.getItem('customerName');
        const tableNumber = sessionStorage.getItem('tableNumber');
        const API_BASE_URL = 'https://resto-scan-production.up.railway.app';

        if (!customerName || !tableNumber) {
            window.location.href = 'index.html';
        }

        document.getElementById('displayName').textContent = customerName;
        document.getElementById('displayTable').textContent = tableNumber;

        // Store all menus globally so we can filter without re-fetching
        let allMenus = [];

        // Category emoji mapping for visual flair
        const categoryEmojis = {
            'Appetizer': '🥗',
            'Dessert': '🍰',
            'Makanan Ringan': '🍢',
            'Mie': '🍜',
            'Nasi': '🍚',
            'Sup': '🍲',
            'Minuman Dingin': '🧊',
            'Minuman Panas': '☕',
        };

        // Ambil menu dari API
        async function loadMenus() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/menus`);
                const data = await response.json();

                if (data.success) {
                    allMenus = data.data;
                    buildCategoryTabs(allMenus);
                    renderMenus(allMenus, 'all');
                }
            } catch (err) {
                console.error('Error loading menus:', err);
                document.getElementById('menuList').innerHTML = '<p>Gagal memuat menu</p>';
            }
        }

        // Build dynamic category tabs from data
        function buildCategoryTabs(menus) {
            const tabsContainer = document.getElementById('categoryTabs');
            const categories = [...new Set(menus.map(m => m.category))].sort();

            categories.forEach(cat => {
                const emoji = categoryEmojis[cat] || '📦';
                const btn = document.createElement('button');
                btn.className = 'cat-tab';
                btn.dataset.cat = cat;
                btn.textContent = `${emoji} ${cat}`;
                btn.onclick = function () { filterCategory(cat, this); };
                tabsContainer.appendChild(btn);
            });
        }

        // Filter by category
        function filterCategory(cat, btnEl) {
            // Update active tab
            document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');

            renderMenus(allMenus, cat);

            // Scroll to top of menu area smoothly
            document.getElementById('menuList').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Create a single menu card element
        function createMenuCard(menu) {
            const rating = (4.3 + Math.random() * 0.6).toFixed(1);
            const starsHTML = '<span class="stars">★★★★★</span> <span class="rating-text">(' + rating + ')</span>';

            const card = document.createElement('div');
            card.className = 'menu-card';
            card.innerHTML = `
                <div class="img-wrapper">
                    <img src="${menu.image_url}" alt="${menu.name}" loading="lazy">
                </div>
                <h3>${menu.name}</h3>
                <p class="category">${menu.category}</p>
                <div class="rating-row">${starsHTML}</div>
                <p class="description">${menu.description}</p>
                <p class="price">Rp ${menu.price.toLocaleString('id-ID')}</p>
                <button class="btn btn-add" onclick="addToCart('${menu.id}', '${menu.name}', ${menu.price})">
                    + Tambah
                </button>
            `;
            return card;
        }

        // Render menus grouped by category
        function renderMenus(menus, activeFilter) {
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = '';

            // --- "Paling Favorit" Section ---
            if (activeFilter === 'all' || activeFilter === 'favorites') {
                const favorites = [...menus]
                    .sort((a, b) => b.price - a.price)
                    .slice(0, 6);

                const favSection = document.createElement('div');
                favSection.className = 'menu-section';

                const favTitle = document.createElement('h2');
                favTitle.className = 'category-title';
                favTitle.innerHTML = '🔥 Paling Favorit';
                favSection.appendChild(favTitle);

                const favGrid = document.createElement('div');
                favGrid.className = 'menu-grid';
                favorites.forEach(menu => favGrid.appendChild(createMenuCard(menu)));
                favSection.appendChild(favGrid);
                menuList.appendChild(favSection);

                if (activeFilter === 'favorites') return;
            }

            // --- Grouped by Category ---
            let filtered = menus;
            if (activeFilter !== 'all' && activeFilter !== 'favorites') {
                filtered = menus.filter(m => m.category === activeFilter);
            }

            const grouped = {};
            filtered.forEach(menu => {
                const cat = menu.category || 'Lainnya';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(menu);
            });

            const sortedCategories = Object.keys(grouped).sort();

            sortedCategories.forEach(cat => {
                const emoji = categoryEmojis[cat] || '📦';

                const section = document.createElement('div');
                section.className = 'menu-section';

                const title = document.createElement('h2');
                title.className = 'category-title';
                title.innerHTML = `${emoji} ${cat}`;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'menu-grid';
                grouped[cat].forEach(menu => grid.appendChild(createMenuCard(menu)));
                section.appendChild(grid);

                menuList.appendChild(section);
            });
        }

        // Tambah item ke keranjang
        function addToCart(menuId, menuName, price) {
            let cart = JSON.parse(sessionStorage.getItem('cart') || '[]');

            // Cek apakah item sudah ada di keranjang
            const existingItem = cart.find(item => item.id === menuId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id: menuId, name: menuName, price, quantity: 1 });
            }

            sessionStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Render keranjang
        function renderCart() {
            const cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            const cartItems = document.getElementById('cartItems');
            const cartContainer = document.getElementById('cartContainer');
            const collapsedBar = document.getElementById('cartCollapsed');
            const expandedContent = document.getElementById('cartExpanded');

            // Calculate totals
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            // Update collapsed bar
            document.getElementById('cartCount').textContent = totalItems === 0 ? '0 item' : `${totalItems} item`;
            document.getElementById('cartTotalCollapsed').textContent = totalItems === 0 ? '· Rp 0' : `· Rp ${totalPrice.toLocaleString('id-ID')}`;
            document.getElementById('cartTotalBtnCollapsed').textContent = `Rp ${totalPrice.toLocaleString('id-ID')}`;

            // Update expanded total
            document.getElementById('cartTotalExpanded').textContent = `Rp ${totalPrice.toLocaleString('id-ID')}`;

            // Show/hide cart container based on items
            if (cart.length === 0) {
                cartContainer.classList.add('empty');
                collapsedBar.classList.remove('has-items');
            } else {
                cartContainer.classList.remove('empty');
                collapsedBar.classList.add('has-items');
            }

            // Render items in expanded view
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="empty-cart">Belum ada item</p>';
                return;
            }

            cartItems.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span class="cart-item-name">${item.name}</span>
                    <div class="cart-item-controls">
                        <div class="qty">
                            <button class="qty-btn" onclick="decreaseQty(${index})">-</button>
                            <span class="qty-num">${item.quantity}</span>
                            <button class="qty-btn" onclick="increaseQty(${index})">+</button>
                        </div>
                        <span class="cart-item-price">Rp ${(item.price * item.quantity).toLocaleString('id-ID')}</span>
                        <button class="btn-remove" onclick="removeFromCart(${index})">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Expand cart
        function expandCart() {
            const cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            if (cart.length === 0) return;

            const cartContainer = document.getElementById('cartContainer');
            cartContainer.classList.add('expanded');
        }

        // Collapse cart
        function collapseCart() {
            const cartContainer = document.getElementById('cartContainer');
            cartContainer.classList.remove('expanded');
        }

        // Close cart when clicking outside (optional - for better UX)
        document.addEventListener('click', (e) => {
            const cartContainer = document.getElementById('cartContainer');
            const menuList = document.getElementById('menuList');

            if (cartContainer.classList.contains('expanded') &&
                !cartContainer.contains(e.target) &&
                menuList.contains(e.target)) {
                collapseCart();
            }
        });

        // Hapus dari keranjang
        function removeFromCart(index) {
            let cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            sessionStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Tambah qty
        function increaseQty(index) {
            let cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            cart[index].quantity += 1;
            sessionStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Kurangi qty
        function decreaseQty(index) {
            let cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1;
            } else {
                cart.splice(index, 1);
            }
            sessionStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Checkout
        async function checkout() {
            const cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
            if (cart.length === 0) {
                alert('Keranjang masih kosong!');
                return;
            }

            const customerName = sessionStorage.getItem('customerName');
            const tableNumber = sessionStorage.getItem('tableNumber');

            // Siapkan data untuk dikirim ke backend
            const orderData = {
                table_number: parseInt(tableNumber),
                customer_name: customerName,
                items: cart.map(item => ({
                    id: item.id,
                    quantity: item.quantity,
                    notes: '' // Nanti bisa tambah notes
                }))
            };

            try {
                // POST ke backend
                const response = await fetch(`${API_BASE_URL}/api/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                if (data.success) {
                    // Simpan order_id ke sessionStorage
                    sessionStorage.setItem('orderId', data.order_id);

                    // Clear keranjang
                    sessionStorage.removeItem('cart');

                    // Redirect ke halaman status
                    window.location.href = `status.html?order_id=${data.order_id}`;
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                console.error('Error checkout:', err);
                alert('Gagal membuat pesanan');
            }
        }

        // Kembali
        function goBack() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // Load menu saat halaman terbuka
        loadMenus();
        renderCart();
    </script>
</body>

</html>
