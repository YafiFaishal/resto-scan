<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cash Register Silhouette - White -->
  <!-- Screen -->
  <rect x="70" y="50" width="116" height="70" rx="8" stroke="#FFFFFF" stroke-width="10" fill="none"/>
  <!-- Screen line -->
  <line x1="90" y1="75" x2="166" y2="75" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <line x1="90" y1="92" x2="140" y2="92" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="50" y="130" width="156" height="60" rx="10" stroke="#FFFFFF" stroke-width="10" fill="none"/>
  <!-- Buttons row 1 -->
  <rect x="72" y="148" width="18" height="12" rx="3" fill="#FFFFFF"/>
  <rect x="98" y="148" width="18" height="12" rx="3" fill="#FFFFFF"/>
  <rect x="124" y="148" width="18" height="12" rx="3" fill="#FFFFFF"/>
  <!-- Buttons row 2 -->
  <rect x="72" y="166" width="18" height="12" rx="3" fill="#FFFFFF"/>
  <rect x="98" y="166" width="18" height="12" rx="3" fill="#FFFFFF"/>
  <rect x="124" y="166" width="18" height="12" rx="3" fill="#FFFFFF"/>
  <!-- Cash drawer -->
  <rect x="152" y="148" width="36" height="30" rx="4" fill="#FFFFFF"/>
  <!-- Receipt -->
  <rect x="108" y="30" width="40" height="28" rx="4" stroke="#FFFFFF" stroke-width="6" fill="none"/>
  <line x1="118" y1="42" x2="138" y2="42" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="50" y1="200" x2="206" y2="200" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
</svg>
