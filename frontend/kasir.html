<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resto Scan - Dashboard Kasir</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-container h1 {
            margin-bottom: 10px;
            color: #333;
        }

        .login-container p {
            color: #666;
            margin-bottom: 30px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-form input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-form button {
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .login-form button:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            display: none;
            margin-top: 10px;
        }

        .kasir-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
        }

        .order-card.pending {
            border-left-color: #ffc107;
        }

        .order-card.diproses {
            border-left-color: #17a2b8;
        }

        .order-card.siap {
            border-left-color: #28a745;
        }

        .order-card.selesai {
            border-left-color: #6c757d;
        }

        .order-card h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .order-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .status-current {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 10px 0;
            color: white;
        }

        .status-current.pending {
            background: #ffc107;
        }

        .status-current.diproses {
            background: #17a2b8;
        }

        .status-current.siap {
            background: #28a745;
        }

        .status-current.selesai {
            background: #6c757d;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-status {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: #f0f0f0;
            color: #333;
            min-width: 80px;
        }

        .btn-status:hover {
            background: #667eea;
            color: white;
        }

        .btn-status.active {
            background: #667eea;
            color: white;
        }

        .kasir-header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        #loginPage {
            display: none;
        }

        #dashboardPage {
            display: block;
        }
    </style>
</head>

<body>
    <!-- LOGIN PAGE -->
    <div id="loginPage">
        <div class="login-container">
            <h1>🔐 Kasir Login</h1>
            <p>Masukkan password untuk akses dashboard</p>

            <form class="login-form" onsubmit="handleLogin(event)">
                <input type="password" id="passwordInput" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <div class="error-message" id="errorMsg">Password salah!</div>
        </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div id="dashboardPage" class="container">
        <!-- Header -->
        <div class="kasir-header">
            <div>
                <h1>👨‍💼 Dashboard Kasir</h1>
                <p id="lastUpdate" style="color: #999; font-size: 12px; margin: 5px 0 0 0;">
                    Auto-refresh setiap 15 detik
                </p>
            </div>
            <div style="display: flex; gap: 30px; align-items: center;">
                <div style="display: flex; gap: 30px;">
                    <div class="stat-box">
                        <div class="stat-number" id="statPending">0</div>
                        <div class="stat-label">Menunggu</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="statProses">0</div>
                        <div class="stat-label">Diproses</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="statSiap">0</div>
                        <div class="stat-label">Siap</div>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Daftar Pesanan -->
        <div id="ordersList" class="kasir-container">
            <p>Loading pesanan...</p>
        </div>
    </div>

    <script>
        // Ganti password di bawah ini
        const KASIR_PASSWORD = 'resto123';
        const API_BASE_URL = 'https://resto-scan-production.up.railway.app'; // Ganti dengan URL Railway kamu

        // Check apakah sudah login
        window.addEventListener('load', () => {
            const isLoggedIn = sessionStorage.getItem('kasirLoggedIn');
            if (isLoggedIn === 'true') {
                showDashboard();
                loadOrders();
                setInterval(loadOrders, 15000);
            } else {
                showLogin();
            }
        });

        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('passwordInput').value;

            if (password === KASIR_PASSWORD) {
                sessionStorage.setItem('kasirLoggedIn', 'true');
                showDashboard();
                loadOrders();
                setInterval(loadOrders, 15000);
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('passwordInput').value = '';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
            }
        }

        function showLogin() {
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('dashboardPage').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'block';
        }

        function logout() {
            sessionStorage.removeItem('kasirLoggedIn');
            showLogin();
            document.getElementById('passwordInput').value = '';
        }

        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/orders`);
                const data = await response.json();

                if (data.success) {
                    renderOrders(data.orders);
                    updateStats(data.orders);
                    updateLastRefresh();
                }
            } catch (err) {
                console.error('Error loading orders:', err);
            }
        }

        function renderOrders(orders) {
            const ordersList = document.getElementById('ordersList');

            if (orders.length === 0) {
                ordersList.innerHTML = '<p style="grid-column: 1/-1;">Tidak ada pesanan</p>';
                return;
            }

            ordersList.innerHTML = orders.map(order => `
        <div class="order-card ${order.status}">
          <h3>Meja ${order.table_number}</h3>
          <div class="order-info">
            <strong>${order.customer_name}</strong><br>
            ID: #${order.id.slice(0, 8).toUpperCase()}<br>
            ${new Date(order.created_at).toLocaleString('id-ID')}
          </div>
          <div class="status-current ${order.status}">
            ${getStatusLabel(order.status)}
          </div>
          <div class="action-buttons">
            <button class="btn-status ${order.status === 'pending' ? 'active' : ''}" 
              onclick="updateStatus('${order.id}', 'pending')">Pending</button>
            <button class="btn-status ${order.status === 'diproses' ? 'active' : ''}" 
              onclick="updateStatus('${order.id}', 'diproses')">Masak</button>
            <button class="btn-status ${order.status === 'siap' ? 'active' : ''}" 
              onclick="updateStatus('${order.id}', 'siap')">Siap</button>
            <button class="btn-status ${order.status === 'selesai' ? 'active' : ''}" 
              onclick="updateStatus('${order.id}', 'selesai')">Selesai</button>
          </div>
        </div>
      `).join('');
        }

        function getStatusLabel(status) {
            const labels = {
                'pending': '⏳ Menunggu',
                'diproses': '👨‍🍳 Diproses',
                'siap': '✅ Siap',
                'selesai': '🎉 Selesai'
            };
            return labels[status] || status;
        }

        async function updateStatus(orderId, newStatus) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/orders/${orderId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                const data = await response.json();
                if (data.success) {
                    loadOrders(); // Refresh daftar
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                console.error('Error updating status:', err);
                alert('Gagal update status');
            }
        }

        function updateStats(orders) {
            const statPending = orders.filter(o => o.status === 'pending').length;
            const statProses = orders.filter(o => o.status === 'diproses').length;
            const statSiap = orders.filter(o => o.status === 'siap').length;

            document.getElementById('statPending').textContent = statPending;
            document.getElementById('statProses').textContent = statProses;
            document.getElementById('statSiap').textContent = statSiap;
        }

        function updateLastRefresh() {
            const now = new Date().toLocaleTimeString('id-ID');
            document.getElementById('lastUpdate').textContent = `Update terakhir: ${now}`;
        }
    </script>
</body>

</html>
